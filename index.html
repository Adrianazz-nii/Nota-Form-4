    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #A1081E 50%, #FBB728 50%);
      min-height: 100vh;
      padding: 20px;
      animation: gradientShift 15s ease infinite;
      background-size: 200% 200%;
    }

    @keyframes gradientShift {
      0% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }

      100% {
        background-position: 0% 50%;
      }
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      animation: fadeIn 1s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header {
      text-align: center;
      margin-bottom: 40px;
      animation: slideDown 0.8s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    header h1 {
      color: white;
      font-size: 3rem;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
      animation: pulse 2s ease infinite;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1);
      }

      50% {
        transform: scale(1.02);
      }
    }

    header p {
      color: rgba(255, 255, 255, 0.8);
      font-size: 1.2rem;
      animation: fadeIn 1s ease 0.3s both;
    }

    .subjects {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .subject-card {
      background: white;
      border-radius: 20px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.6s ease both;
    }

    .subject-card:nth-child(1) {
      animation-delay: 0.1s;
    }

    .subject-card:nth-child(2) {
      animation-delay: 0.2s;
    }

    .subject-card:nth-child(3) {
      animation-delay: 0.3s;
    }

    .subject-card:nth-child(4) {
      animation-delay: 0.4s;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(40px) scale(0.9);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .subject-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: left 0.5s;
    }

    .subject-card:hover::before {
      left: 100%;
    }

    .subject-card:hover {
      transform: translateY(-15px) scale(1.02);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
    }

    .subject-card:active {
      transform: translateY(-5px) scale(0.98);
      transition: all 0.1s;
    }

    .subject-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      margin: 0 auto 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      transition: all 0.4s ease;
      animation: bounce 2s ease infinite;
    }

    @keyframes bounce {

      0%,
      100% {
        transform: translateY(0);
      }

      50% {
        transform: translateY(-10px);
      }
    }

    .subject-card:hover .subject-icon {
      transform: scale(1.2) rotate(10deg);
      animation: none;
    }

    .bio {
      background: linear-gradient(135deg, #10b981, #059669);
      box-shadow: 0 5px 15px rgba(16, 185, 129, 0.4);
    }

    .fiz {
      background: linear-gradient(135deg, #3b82f6, #2563eb);
      box-shadow: 0 5px 15px rgba(59, 130, 246, 0.4);
    }

    .kim {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4);
    }

    .mat {
      background: linear-gradient(135deg, #8b5cf6, #7c3aed);
      box-shadow: 0 5px 15px rgba(139, 92, 246, 0.4);
    }

    .subject-card h3 {
      color: #333;
      font-size: 1.3rem;
      margin-bottom: 5px;
      transition: color 0.3s;
    }

    .subject-card:hover h3 {
      color: #667eea;
    }

    .subject-card span {
      color: #666;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .subject-card:hover span {
      color: #764ba2;
      font-weight: bold;
    }

    .chapter-list {
      background: white;
      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      animation: slideInRight 0.5s ease;
    }

    @keyframes slideInRight {
      from {
        opacity: 0;
        transform: translateX(50px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chapter-list h2 {
      color: #333;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 3px solid #667eea;
      position: relative;
    }

    .chapter-list h2::after {
      content: '';
      position: absolute;
      bottom: -3px;
      left: 0;
      width: 0;
      height: 3px;
      background: linear-gradient(90deg, #667eea, #764ba2);
      animation: expandWidth 1s ease forwards;
    }

    @keyframes expandWidth {
      to {
        width: 100px;
      }
    }

    .chapter-item {
      display: flex;
      align-items: center;
      padding: 15px 20px;
      margin-bottom: 10px;
      background: #f8f9fa;
      border-radius: 12px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      cursor: pointer;
      position: relative;
      overflow: hidden;
      animation: fadeInLeft 0.4s ease both;
    }

    .chapter-item:nth-child(1) {
      animation-delay: 0.1s;
    }

    .chapter-item:nth-child(2) {
      animation-delay: 0.2s;
    }

    .chapter-item:nth-child(3) {
      animation-delay: 0.3s;
    }

    .chapter-item:nth-child(4) {
      animation-delay: 0.4s;
    }

    .chapter-item:nth-child(5) {
      animation-delay: 0.5s;
    }

    .chapter-item:nth-child(6) {
      animation-delay: 0.6s;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .chapter-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      width: 4px;
      background: linear-gradient(180deg, #667eea, #764ba2);
      transform: scaleY(0);
      transition: transform 0.3s;
    }

    .chapter-item:hover::before {
      transform: scaleY(1);
    }

    .chapter-item:hover {
      background: #e0e7ff;
      transform: translateX(15px) scale(1.02);
      box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
    }

    .chapter-item:active {
      transform: translateX(5px) scale(0.98);
    }

    .chapter-icon {
      width: 50px;
      height: 50px;
      background: #fee2e2;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 15px;
      font-size: 1.5rem;
      transition: all 0.3s ease;
    }

    .chapter-item:hover .chapter-icon {
      transform: rotate(360deg) scale(1.1);
      background: linear-gradient(135deg, #667eea, #764ba2);
    }

    .chapter-info h4 {
      color: #333;
      margin-bottom: 3px;
      transition: color 0.3s;
    }

    .chapter-item:hover h4 {
      color: #667eea;
    }

    .chapter-info p {
      color: #666;
      font-size: 0.85rem;
      transition: color 0.3s;
    }

    .chapter-item:hover p {
      color: #764ba2;
    }

      border-radius: 20px;
      padding: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
      margin-top: 20px;
      animation: zoomIn 0.5s ease;

    @keyframes zoomIn {
      from {

        transform: scale(0.9);
      }

      to {
        opacity: 1;
        transform: scale(1);

    .pdf-header {

      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding-bottom: 15px;

    .btn {

      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 600;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

      overflow: hidden;

    .btn::before {

      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:active::before {
      width: 300px;
      height: 300px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }

      box-shadow: 0 8px 25px rgba(102, 126, 234, 0.6);
    }

    }

    .btn-secondary {
      background: #f3f4f6;
      color: #666;
      margin-right: 10px;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
      transform: translateY(-2px);
    }

    iframe {
      width: 100%;
      height: 600px;
      border: none;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
      transition: all 0.3s;
    }

    iframe:hover {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }

    .hidden {
      display: none !important;
    }

    /* Loading spinner */
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, .3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @media (max-width: 768px) {
      header h1 {
        font-size: 2rem;
        animation: none;
      }

      .subjects {
        grid-template-columns: 1fr;
      }

      .subject-card {
        animation-delay: 0s !important;
      }
    }
  </style>
</head>

          url: "https://drive.google.com/file/d/1pA6yVxY2mfJoMvvWk5YFG5sRtTFnq_oM/view"
        },
        {

          title: "Bab 8 - Pilihan Raya",
          desc: "",
          url: "https://drive.google.com/file/d/1n9-YEb0QAQhNatc9XtkLTTcZwGGmLvTL/view"

        },
      ]
    };
    const subjectNames = {
      biologi: "Biologi",
      fizik: "Fizik",
      kimia: "Kimia",
      Sejarah: "Sejarah"
    };

    function showChapters(subject) {
      document.getElementById('subjectsView').classList.add('hidden');
      document.getElementById('chaptersView').classList.remove('hidden');
      document.getElementById('subjectTitle').textContent = subjectNames[subject];
      const list = document.getElementById('chaptersList');
      const chapters = notesData[subject];
      list.innerHTML = chapters.map((ch, index) => `
                <div class="chapter-item" onclick="openPdf('${subject}', ${ch.id})" style="animation-delay: ${index * 0.1}s">
                    <div class="chapter-icon">📄</div>
                    <div class="chapter-info">
                        <h4>${ch.title}</h4>
                        <p>${ch.desc}</p>
                    </div>
                </div>
            `).join('');
    }

    function backToSubjects() {
      document.getElementById('chaptersView').classList.add('hidden');
      document.getElementById('pdfView').classList.add('hidden');
      document.getElementById('subjectsView').classList.remove('hidden');
    }

    function openPdf(subject, id) {
      const chapter = notesData[subject].find(c => c.id === id);
      if (!chapter) return;
      document.getElementById('chaptersView').classList.add('hidden');
      document.getElementById('pdfView').classList.remove('hidden');
      document.getElementById('pdfSubject').textContent = subjectNames[subject];
      document.getElementById('pdfTitle').textContent = chapter.title;
      document.getElementById('downloadLink').href = chapter.url;
      let embedUrl = chapter.url;
      if (chapter.url.includes('drive.google.com')) {
        const fileId = chapter.url.match(/[-\w]{25,}/);
        if (fileId) {
          embedUrl = `https://drive.google.com/file/d/${fileId[0]}/preview`;
        }
      }
      document.getElementById('pdfContainer').innerHTML = `
                <iframe src="${embedUrl}" onload="this.style.opacity='1'" style="opacity:0; transition:opacity 0.5s"></iframe>
            `;
    }

    function closePdf() {
      document.getElementById('pdfView').classList.add('hidden');
      document.getElementById('chaptersView').classList.remove('hidden');
      document.getElementById('pdfContainer').innerHTML = '';
    }
  </script>
